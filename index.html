.wrap{max-width:900px;margin:0 auto;padding:20px 16px}
header{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;
       box-shadow:0 4px 20px rgba(0,0,0,.35);display:flex;
       justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:700;color:#0f172a}
.meta{color:#64748b;font-size:12px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;
     background:#2563eb;color:#fff;border:none;border-radius:8px;
     font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#93c5fd;cursor:not-allowed}
.btn-month{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;
           cursor:pointer;white-space:nowrap;transition:all .15s;border:2px solid #2563eb}
.status{background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:16px;
        box-shadow:0 4px 20px rgba(0,0,0,.35);color:#64748b;font-size:13px;
        display:flex;align-items:center;gap:10px}
.spinner{width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#2563eb;
         border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* Заголовки секций */
.section-title{font-size:15px;font-weight:700;color:#0f172a;margin:20px 0 10px;
               padding-left:4px;border-left:4px solid #2563eb;padding-left:10px}
/* KPI */
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-day{grid-template-columns:repeat(5,1fr)}
.kpi-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 4px 20px rgba(0,0,0,.35);text-align:center;display:flex;flex-direction:column;justify-content:space-between}
.kpi-card .lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-card .val{font-size:20px;font-weight:700;white-space:nowrap;display:flex;align-items:center;justify-content:center}
.blue{color:#2563eb}.green{color:#16a34a}.orange{color:#d97706;font-weight:600}
/* Таблица (десктоп) */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;
      overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.35);margin-bottom:16px}
thead tr{background:#f8fafc}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;

<script>
// ── Конфигурация ────────────────────────────────────────────────────────────
const WH = 'https://dcatering.bitrix24.ru/rest/160/ghlyw75jejp57sex';
const CATEGORY_ID = 4;
const CONFIRMED   = 'C4:UC_3KB83W';
const REALIZED    = 'C4:WON';
const MANAGERS = [
  { name: 'Кирасирова Анна',   id: '12752' },
  { name: 'Воронежцева Алина', id: '9174'  },
  { name: 'Айсина Динара',     id: '14262' },
  { name: 'Федотова Дарья',    id: '160'   },
];
// Планы продаж по менеджерам: id → { месяц: сумма }
const PLANS = {
  '12752': { 4: 2982000, 5: 2070000, 6: 2802000 },   // Анна
  '9174':  { 4: 3314000, 5: 2250000, 6: 3104000 },   // Алина
  '14262': { 4: 2048000, 5: 1440000, 6: 1928000 },   // Динара
  '160':   { 4: 1896000, 5: 1440000, 6: 1806000 },   // Дарья
};
function currentPlan(userId, monthNum) {
  const m = monthNum || (mskNow().getMonth() + 1);
  return PLANS[userId]?.[m] || 0;
}
function nextMonthNum() {
  const m = mskNow().getMonth() + 1;
  return m === 12 ? 1 : m + 1;
}

// ── Утилиты ─────────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

function mskNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Moscow' }));
}
function todayMSK() {
  const d = mskNow();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function tomorrowOf(ymd) {
  const d = new Date(ymd + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function nowMSKStr() {
  const d = mskNow();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T`
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}+03:00`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtMoney(n) {
  if (!n) return '—';
  return Math.round(n).toLocaleString('ru-RU') + ' ₽';
}
function fmtNum(n) { return n ? String(n) : '—'; }
function monthStartMSK() {
  const d = mskNow();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01T00:00:00+03:00`;
}
function prevMonthStartMSK() {
  const d = mskNow();
  const m = d.getMonth(); // 0-based, это и есть номер прошлого месяца
  const y = m === 0 ? d.getFullYear() - 1 : d.getFullYear();
  const pm = m === 0 ? 12 : m;
  return `${y}-${pad(pm)}-01T00:00:00+03:00`;
}
function prevMonthEndMSK() { return monthStartMSK(); }
function prevMonthNum() {
  const m = mskNow().getMonth() + 1; // текущий месяц
  return m === 1 ? 12 : m - 1;
}
function nextMonthStartMSK() {
  const d = mskNow();
  const y = d.getMonth() === 11 ? d.getFullYear() + 1 : d.getFullYear();
  const m = d.getMonth() === 11 ? 1 : d.getMonth() + 2;
  return `${y}-${pad(m)}-01T00:00:00+03:00`;
}
function nextMonthEndMSK() {
  const d = mskNow();
  const m1 = d.getMonth() === 11 ? 1 : d.getMonth() + 2; // первый месяц следующего
  const m2 = m1 === 12 ? 1 : m1 + 1;                     // месяц после следующего
  const y  = m1 === 1 ? d.getFullYear() + 1 : d.getFullYear();
  const y2 = m2 === 1 ? y + 1 : y;
  return `${y2}-${pad(m2)}-01T00:00:00+03:00`;
}
function monthEndMSK() {
  const d = mskNow();
  const y = d.getFullYear(), m = d.getMonth() + 1;
  const next = m === 12 ? `${y+1}-01` : `${y}-${pad(m+1)}`;
  return `${next}-01T00:00:00+03:00`;
}

// ── Bitrix24 API ─────────────────────────────────────────────────────────────
function flatQS(obj, prefix='') {
  const parts = [];
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? `${prefix}[${k}]` : k;
    if (v !== null && v !== undefined && typeof v === 'object' && !Array.isArray(v)) {
      parts.push(flatQS(v, key));
    } else if (Array.isArray(v)) {
      v.forEach((item, i) => parts.push(`${encodeURIComponent(`${key}[${i}]`)}=${encodeURIComponent(item)}`));
    } else if (v !== null && v !== undefined) {
      parts.push(`${encodeURIComponent(key)}=${encodeURIComponent(v)}`);
    }
  }
  return parts.join('&');
}

async function bx(method, params={}, retries=6) {
  const qs = flatQS(params);
  const url = `${WH}/${method}.json${qs ? '?'+qs : ''}`;
  let delay = 1000;
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url);
      if (r.status === 429 || r.status === 503) { await sleep(delay); delay = Math.min(delay*2,30000); continue; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (d.error) throw new Error(`Bitrix: ${d.error}`);
      return d;
    } catch(e) {
      if (i === retries-1) throw e;
      await sleep(delay); delay = Math.min(delay*2,30000);
    }
  }
}

async function paginateAll(method, params={}) {
  const items = []; let start = 0;
  while (true) {
    const resp = await bx(method, {...params, start});
    let page = resp.result;
    if (page && !Array.isArray(page)) page = page.tasks || page.items || [];
    if (!page || page.length === 0) break;
    items.push(...page);
    if (resp.next == null) break;
    start = resp.next;
    await sleep(150);
  }
  return items;
}

// ── Метрики ──────────────────────────────────────────────────────────────────
async function loadTransitions(fromTime, today) {
  const tomorrow = tomorrowOf(today);
  const items = await paginateAll('crm.stagehistory.list', {
    entityTypeId: 2,
    filter: { '>=CREATED_TIME': fromTime, '<CREATED_TIME': `${tomorrow}T00:00:00+03:00` },
    select: ['ID','OWNER_ID','CREATED_TIME','STAGE_ID','CATEGORY_ID'],
  });
  const result = {};
  for (const item of items) {
    const ct = item.CREATED_TIME || '';
    if (ct >= today && String(item.CATEGORY_ID) === String(CATEGORY_ID)) {
      (result[item.STAGE_ID] = result[item.STAGE_ID] || new Set()).add(String(item.OWNER_ID));
    }
  }
  return result;
}

async function stageDeals(ids, userId, extra=[]) {
  if (!ids || ids.size === 0) return [];
  const select = ['ID','OPPORTUNITY',...extra];
  const all = [];
  const arr = [...ids];
  for (let i = 0; i < arr.length; i += 50) {
    const batch = arr.slice(i, i+50);
    const deals = await paginateAll('crm.deal.list', {
      filter: { ID: batch, ASSIGNED_BY_ID: userId, CATEGORY_ID },
      select,
    });
    all.push(...deals);
  }
  return all;
}

async function getConfirmed(userId, ids) {
  const deals = await stageDeals(ids, userId);
  return deals.reduce((s,d) => s + parseFloat(d.OPPORTUNITY||0), 0);
}

async function getRealized(userId, ids) {
  const deals = await stageDeals(ids, userId, ['MODIFY_BY_ID']);
  return deals
    .filter(d => String(d.MODIFY_BY_ID) === String(userId))
    .reduce((s,d) => s + parseFloat(d.OPPORTUNITY||0), 0);
}

async function getCalls(userId, fromTime, today) {
  const tomorrow = tomorrowOf(today);
  const items = await paginateAll('voximplant.statistic.get', {
    filter: { PORTAL_USER_ID: userId, '>=CALL_START_DATE': today, '<CALL_START_DATE': tomorrow },
    select: ['CALL_DURATION','CALL_START_DATE'],
  });
  return items.filter(i => i.CALL_START_DATE >= fromTime && parseInt(i.CALL_DURATION||0) >= 40).length;
}

async function getNewDeals(userId, fromTime, today) {
  const tomorrow = tomorrowOf(today);
  const deals = await paginateAll('crm.deal.list', {
    filter: { CATEGORY_ID, ASSIGNED_BY_ID: userId, '>=DATE_CREATE': today, '<DATE_CREATE': tomorrow },
    select: ['ID','DATE_CREATE'],
  });
  return deals.filter(d => d.DATE_CREATE >= fromTime).length;
}

async function getTasks(userId, fromTime, today) {
  const changed = await paginateAll('tasks.task.list', {
    filter: { RESPONSIBLE_ID: userId, '>=CHANGED_DATE': today },
    select: ['ID'],
  });
  let count = 0;
  for (const t of changed) {
    const tid = t.id || t.ID;
    if (!tid) continue;
    const resp = await bx('tasks.task.get', { taskId: tid });
    const task = resp?.result?.task || {};
    if (task.status === '5'
        && (task.closedDate||'') >= fromTime
        && String(task.closedBy||'') === String(userId)
        && !(task.title||'').startsWith('CRM:')) {
      count++;
    }
  }
  return count;
}

// Считает сумму подтверждённых сделок менеджера за текущий месяц:
// Поля агентских комиссий (вычитаются из суммы сделки)
const COMMISSION_FIELDS = ['UF_CRM_1675687802829', 'UF_CRM_1675689049773'];

function netOpportunity(d) {
  const opp = parseFloat(d.OPPORTUNITY || 0);
  const comm = COMMISSION_FIELDS.reduce((s, f) => s + parseFloat(d[f] || 0), 0);
  return opp - comm;
}

// Текущий месяц: сделки в CONFIRMED + перешедшие из CONFIRMED в WON в этом месяце
async function getMonthlyRealized(userId, monthStart) {
  if (!monthStart) monthStart = monthStartMSK();
  const extraFields = [...COMMISSION_FIELDS];
  const [inConfirmed, wonThisMonth] = await Promise.all([
    paginateAll('crm.deal.list', {
      filter: { ASSIGNED_BY_ID: userId, CATEGORY_ID, STAGE_ID: CONFIRMED },
      select: ['ID', 'OPPORTUNITY', ...extraFields],
    }),
    paginateAll('crm.deal.list', {
      filter: {
        ASSIGNED_BY_ID: userId,
        CATEGORY_ID,
        STAGE_ID: 'C4:WON',
        '>=DATE_MODIFY': monthStart,
      },
      select: ['ID', 'OPPORTUNITY', 'PREVIOUS_STAGE_ID', 'MOVED_TIME', ...extraFields],
    }),
  ]);
  const wonFromConfirmed = wonThisMonth.filter(d =>
    d.PREVIOUS_STAGE_ID === CONFIRMED && (d.MOVED_TIME || '') >= monthStart
  );
  const seen = new Set();
  return [...inConfirmed, ...wonFromConfirmed]
    .filter(d => { if (seen.has(d.ID)) return false; seen.add(d.ID); return true; })
    .reduce((s, d) => s + netOpportunity(d), 0);
}

// Прошлый месяц: только сделки «Успешно реализовано» за период прошлого месяца
async function getPrevMonthRealized(userId, prevStart, prevEnd) {
  const extraFields = [...COMMISSION_FIELDS];
  const wonPrevMonth = await paginateAll('crm.deal.list', {
    filter: {
      ASSIGNED_BY_ID: userId,
      CATEGORY_ID,
      STAGE_ID: 'C4:WON',
      '>=DATE_MODIFY': prevStart,
    },
    select: ['ID', 'OPPORTUNITY', 'MOVED_TIME', ...extraFields],
  });
  // Фильтруем по MOVED_TIME — точная дата перехода в WON в прошлом месяце
  return wonPrevMonth
    .filter(d => (d.MOVED_TIME || '') >= prevStart && (d.MOVED_TIME || '') < prevEnd)
    .reduce((s, d) => s + netOpportunity(d), 0);
}

// Следующий месяц: CONFIRMED с CLOSEDATE в следующем месяце + WON из CONFIRMED в следующем месяце
async function getNextMonthRealized(userId, nextStart) {
  const nextEnd = nextMonthEndMSK();
  const extraFields = [...COMMISSION_FIELDS];
  const [inConfirmedNext, wonNextMonth] = await Promise.all([
    paginateAll('crm.deal.list', {
      filter: {
        ASSIGNED_BY_ID: userId,
        CATEGORY_ID,
        STAGE_ID: CONFIRMED,
        '>=CLOSEDATE': nextStart,
        '<CLOSEDATE':  nextEnd,
      },
      select: ['ID', 'OPPORTUNITY', 'CLOSEDATE', ...extraFields],
    }),
    paginateAll('crm.deal.list', {
      filter: {
        ASSIGNED_BY_ID: userId,
        CATEGORY_ID,
        STAGE_ID: 'C4:WON',
        '>=DATE_MODIFY': nextStart,
      },
      select: ['ID', 'OPPORTUNITY', 'PREVIOUS_STAGE_ID', 'MOVED_TIME', ...extraFields],
    }),
  ]);
  const wonFromConfirmed = wonNextMonth.filter(d =>
    d.PREVIOUS_STAGE_ID === CONFIRMED && (d.MOVED_TIME || '') >= nextStart
  );
  const seen = new Set();
  return [...inConfirmedNext, ...wonFromConfirmed]
    .filter(d => { if (seen.has(d.ID)) return false; seen.add(d.ID); return true; })
    .reduce((s, d) => s + netOpportunity(d), 0);
}

async function collectOne(userId, fromTime, today, confirmedIds, realizedIds) {
  const [calls, newDeals, confirmed, realized, tasks] = await Promise.all([
    getCalls(userId, fromTime, today),
    getNewDeals(userId, fromTime, today),
    getConfirmed(userId, confirmedIds),
    getRealized(userId, realizedIds),
    getTasks(userId, fromTime, today),
  ]);
  return { calls, newDeals, confirmedSum: confirmed, realizedSum: realized, tasks };
}

// ── Состояние (localStorage) ──────────────────────────────────────────────────
function loadState(today) {
  try {
    const s = JSON.parse(localStorage.getItem('bx_dash_state') || 'null');
    return s?.date === today ? s : null;
  } catch { return null; }
}
function saveState(today, lastCheck, metrics) {
  localStorage.setItem('bx_dash_state', JSON.stringify({ date: today, lastCheck, metrics }));
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setStatus(txt) { document.getElementById('statusText').textContent = txt; }
function showStatus(show) { document.getElementById('status').classList.toggle('hidden', !show); }
function showDash(show)   { document.getElementById('dashboard').classList.toggle('hidden', !show); }
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg; el.classList.toggle('hidden', !msg);
}

function renderDashboard(today, managers, lastCheck, apiCalls, elapsed) {
  _lastRenderArgs = [today, managers, lastCheck, apiCalls, elapsed];
  const isNext = viewMode === 'next';
  const isPrev = viewMode === 'prev';
  const d = mskNow();
  const periodEnd = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const curM  = d.getMonth() + 1;
  const nextM = curM === 12 ? 1 : curM + 1;
  const monthNames = {1:'Январь',2:'Февраль',3:'Март',4:'Апрель',5:'Май',6:'Июнь',
                      7:'Июль',8:'Август',9:'Сентябрь',10:'Октябрь',11:'Ноябрь',12:'Декабрь'};
  const prevM = curM === 1 ? 12 : curM - 1;
  const shownMonth = isNext ? monthNames[nextM] : isPrev ? monthNames[prevM] : monthNames[curM];
  document.getElementById('meta').textContent =
    `${shownMonth}  ·  Период дня: 00:00 – ${periodEnd} МСК  ·  Обновлено: ${lastCheck.slice(11,16)} МСК`;

  const totals = { calls:0, newDeals:0, confirmedSum:0, realizedSum:0, tasks:0 };
  for (const { m } of managers) if (m) for (const k of Object.keys(totals)) totals[k] += m[k]||0;

  // Выбираем данные нужного месяца
  const totalPlan      = managers.reduce((s,{m}) => s + (isNext ? (m?.nextPlan||0) : isPrev ? (m?.prevPlan||0) : (m?.plan||0)), 0);
  const totalMonthReal = managers.reduce((s,{m}) => s + (isNext ? (m?.nextMonthlyRealized||0) : isPrev ? (m?.prevMonthlyRealized||0) : (m?.monthlyRealized||0)), 0);
  const totalRemaining = managers.reduce((s,{m}) => s + (isNext ? (m?.nextRemaining||0) : isPrev ? (m?.prevRemaining||0) : (m?.remaining||0)), 0);
  const totalPct       = totalPlan > 0 ? Math.round((totalMonthReal / totalPlan) * 100) : 0;
  const totalPctCls    = totalPct >= 80 ? 'green' : totalPct >= 60 ? 'orange' : 'red';
  const remCls         = totalRemaining <= 0 ? 'green' : 'red';

  // KPI — месяц
  document.getElementById('kpiMonth').innerHTML = `
    <div class="kpi-card"><div class="lbl">Общий план</div><div class="val blue">${fmtMoney(totalPlan)}</div></div>
    <div class="kpi-card"><div class="lbl">Выручка</div><div class="val green">${fmtMoney(totalMonthReal)}</div></div>
    <div class="kpi-card"><div class="lbl">Выполнение плана</div><div class="val ${totalPctCls}">${totalPct}%</div></div>
    <div class="kpi-card"><div class="lbl">Остаток плана</div><div class="val ${remCls}">${totalRemaining<=0?'✓ Выполнен':fmtMoney(totalRemaining)}</div></div>
  `;

  // KPI — день
  document.getElementById('kpiDay').innerHTML = `
    <div class="kpi-card"><div class="lbl">Звонки &gt;40с</div><div class="val blue">${fmtNum(totals.calls)}</div></div>
    <div class="kpi-card"><div class="lbl">Новые сделки</div><div class="val blue">${fmtNum(totals.newDeals)}</div></div>
    <div class="kpi-card"><div class="lbl">Подписано</div><div class="val green">${fmtMoney(totals.confirmedSum)}</div></div>
    <div class="kpi-card"><div class="lbl">Успешно реализовано</div><div class="val green">${fmtMoney(totals.realizedSum)}</div></div>
    <div class="kpi-card"><div class="lbl">Задачи</div><div class="val blue">${fmtNum(totals.tasks)}</div></div>
  `;

  const sorted = [...managers].sort((a,b) => ((b.m||{}).realizedSum||0) - ((a.m||{}).realizedSum||0));

  const TROPHY = `<svg class="trophy" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M44 8H20v20c0 6.627 5.373 12 12 12s12-5.373 12-12V8z" fill="#FFC107"/>
    <path d="M44 8H20v8h24V8z" fill="#FFD54F"/>
    <path d="M20 14H10v4c0 5.523 4.477 10 10 10v-14z" fill="#FFC107"/>
    <path d="M44 14h10v4c0 5.523-4.477 10-10 10V14z" fill="#FFC107"/>
    <path d="M28 40h8v6h-8z" fill="#FFC107"/>
    <path d="M22 46h20v4H22z" fill="#8D6E63"/>
    <path d="M20 50h24v4H20z" fill="#795548"/>
    <circle cx="32" cy="24" r="6" fill="#FFD54F" opacity=".5"/>
  </svg>`;

  // Заголовок месяца
  document.getElementById('secMonthTitle').textContent =
    `📅 Результаты за месяц — ${shownMonth}`;

  // Таблица — месяц
  document.getElementById('tbodyMonth').innerHTML = sorted.map(({ name, m }) => {
    if (!m) return `<tr><td class="mname">${name}</td><td colspan="3" class="zero">—</td></tr>`;
    const td = (v, fn=fmtNum) => { const s=fn(v); return `<td class="${s==='—'?'zero':fn===fmtMoney&&s!=='—'?'money':''}">${s}</td>`; };
    const mReal = isNext ? (m.nextMonthlyRealized||0) : isPrev ? (m.prevMonthlyRealized||0) : (m.monthlyRealized||0);
    const mPlan = isNext ? (m.nextPlan||0) : isPrev ? (m.prevPlan||0) : (m.plan||0);
    const rem   = mPlan - mReal;
    const trophy = rem <= 0 && mPlan > 0 ? TROPHY : '';
    const pct = mPlan > 0 ? Math.round((mReal / mPlan) * 100) : 0;
    const pctCls = pct >= 80 ? 'pct-done' : pct >= 60 ? 'pct-mid' : 'pct-low';
    const pctBadge = mPlan > 0 ? `<span class="pct-badge ${pctCls}">${pct}%</span>` : '';
    const remTd = mPlan <= 0
      ? `<td class="zero">—</td>`
      : rem <= 0
        ? `<td class="plan-done">✓ Выполнен</td>`
        : `<td class="plan-left">${fmtMoney(rem)}</td>`;
    return `<tr><td class="mname">${name}${trophy}${pctBadge}</td><td class="money">${mPlan > 0 ? fmtMoney(mPlan) : '—'}</td>${td(mReal,fmtMoney)}${remTd}</tr>`;
  }).join('');

  // Таблица — день
  document.getElementById('tbodyDay').innerHTML = sorted.map(({ name, m }) => {
    if (!m) return `<tr><td class="mname">${name}</td><td colspan="5" class="zero">—</td></tr>`;
    const td = (v, fn=fmtNum) => { const s=fn(v); return `<td class="${s==='—'?'zero':fn===fmtMoney&&s!=='—'?'money':''}">${s}</td>`; };
    return `<tr><td class="mname">${name}</td>${td(m.calls)}${td(m.newDeals)}${td(m.confirmedSum,fmtMoney)}${td(m.realizedSum,fmtMoney)}${td(m.tasks)}</tr>`;
  }).join('');

  // Карточки (мобиль)
  const row = (label, val, cls='') =>
    `<div class="mgr-row"><span class="rl">${label}</span><span class="rv ${cls}">${val}</span></div>`;
  document.getElementById('mgrCards').innerHTML = sorted.map(({ name, m }) => {
    if (!m) return `<div class="mgr-card"><div class="mgr-card-name">${name}</div><div class="mgr-row"><span class="rl">Нет данных</span></div></div>`;
    const c = (v,fn=fmtNum) => { const s=fn(v); return s==='—'?'zero':fn===fmtMoney&&s!=='—'?'money':''; };
    const mReal = isNext ? (m.nextMonthlyRealized||0) : isPrev ? (m.prevMonthlyRealized||0) : (m.monthlyRealized||0);
    const mPlan = isNext ? (m.nextPlan||0) : isPrev ? (m.prevPlan||0) : (m.plan||0);
    const rem   = mPlan - mReal;
    const trophy = rem <= 0 && mPlan > 0 ? TROPHY : '';
    const pct = mPlan > 0 ? Math.round((mReal / mPlan) * 100) : 0;
    const pctCls = pct >= 80 ? 'pct-done' : pct >= 60 ? 'pct-mid' : 'pct-low';
    const pctBadge = `<span class="pct-badge ${pctCls}">${pct}%</span>`;
    const remVal = rem <= 0 ? '✓ Выполнен' : fmtMoney(rem);
    const remCls = rem <= 0 ? 'money' : 'plan-left-txt';
    return `<div class="mgr-card">
      <div class="mgr-card-name">${name}${trophy}${pctBadge}</div>
      <div class="card-section-lbl">За месяц — ${shownMonth}</div>
      ${row('План', fmtMoney(mPlan), 'money')}
      ${row('Выручка', fmtMoney(mReal), 'money')}
      ${row('Остаток плана', remVal, remCls)}
      <div class="card-section-lbl">За день</div>
      ${row('Звонки &gt;40с', fmtNum(m.calls), c(m.calls))}
      ${row('Новые сделки', fmtNum(m.newDeals), c(m.newDeals))}
      ${row('Подписано', fmtMoney(m.confirmedSum), c(m.confirmedSum,fmtMoney))}
      ${row('Успешно реализовано', fmtMoney(m.realizedSum), c(m.realizedSum,fmtMoney))}
      ${row('Задачи', fmtNum(m.tasks), c(m.tasks))}
    </div>`;
  }).join('');

  document.getElementById('footer').textContent =
    `API-вызовов: ${apiCalls}  ·  Время: ${elapsed}с`;

  showDash(true);
}

// ── Переключение месяца ───────────────────────────────────────────────────────
let viewMode = 'current';
let _lastRenderArgs = null;

function setView(mode) {
  viewMode = mode;
  const active = 'background:#2563eb;color:#fff;border:2px solid #2563eb';
  const idle   = 'background:#fff;color:#2563eb;border:2px solid #2563eb';
  document.getElementById('btnPrev').style.cssText = mode === 'prev'    ? active : idle;
  document.getElementById('btnCur').style.cssText  = mode === 'current' ? active : idle;
  document.getElementById('btnNext').style.cssText = mode === 'next'    ? active : idle;
  if (_lastRenderArgs) renderDashboard(..._lastRenderArgs);
}

// ── Главная функция ───────────────────────────────────────────────────────────
let running = false;
async function refresh() {
  if (running) return;
  running = true;
  document.getElementById('btn').disabled = true;
  showErr('');
  showStatus(true);

  const t0 = Date.now();
  let apiCalls = 0;
  const origBx = bx;
  // Простой счётчик API-вызовов
  window._bxCount = 0;

  try {
    const today = todayMSK();
    const state = loadState(today);
    const fromTime = state?.lastCheck || `${today}T00:00:00+03:00`;
    const isFirst = !state;

    setStatus(isFirst ? 'Первый сбор за сегодня (с 00:00 МСК)...' : `Обновление с ${fromTime.slice(11,16)} МСК...`);

    setStatus('Загрузка переходов по стадиям...');
    const transitions = await loadTransitions(fromTime, today);
    const confirmedIds = transitions[CONFIRMED] || new Set();
    const realizedIds  = transitions[REALIZED]  || new Set();

    const accumulated = state?.metrics || {};
    const results = [];

    const nextStart = nextMonthStartMSK();
    const nextMon   = nextMonthNum();
    const prevStart = prevMonthStartMSK();
    const prevEnd   = prevMonthEndMSK();
    const prevMon   = prevMonthNum();
    for (const mgr of MANAGERS) {
      setStatus(`Сбор данных: ${mgr.name}...`);
      const [delta, monthReal, nextReal, prevReal] = await Promise.all([
        collectOne(mgr.id, fromTime, today, confirmedIds, realizedIds),
        getMonthlyRealized(mgr.id),
        getNextMonthRealized(mgr.id, nextStart),
        getPrevMonthRealized(mgr.id, prevStart, prevEnd),
      ]);
      const prev  = accumulated[mgr.id] || { calls:0, newDeals:0, confirmedSum:0, realizedSum:0, tasks:0 };
      const plan     = currentPlan(mgr.id);
      const nextPlan = currentPlan(mgr.id, nextMon);
      const prevPlan = currentPlan(mgr.id, prevMon);
      const merged = {
        calls:               prev.calls        + delta.calls,
        newDeals:            prev.newDeals     + delta.newDeals,
        confirmedSum:        prev.confirmedSum + delta.confirmedSum,
        realizedSum:         prev.realizedSum  + delta.realizedSum,
        tasks:               prev.tasks        + delta.tasks,
        monthlyRealized:     monthReal,
        plan:                plan,
        remaining:           plan - monthReal,
        nextMonthlyRealized: nextReal,
        nextPlan:            nextPlan,
        nextRemaining:       nextPlan - nextReal,
        prevMonthlyRealized: prevReal,
        prevPlan:            prevPlan,
        prevRemaining:       prevPlan - prevReal,
      };
      accumulated[mgr.id] = merged;
      results.push({ name: mgr.name, m: merged });
    }

    const lastCheck = nowMSKStr();
    saveState(today, lastCheck, accumulated);

    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    showStatus(false);
    renderDashboard(today, results, lastCheck, '—', elapsed);

  } catch(e) {
    showStatus(false);
    showErr('Ошибка: ' + e.message + '. Проверьте подключение к интернету и попробуйте снова.');
    console.error(e);
  } finally {
    running = false;
    document.getElementById('btn').disabled = false;
  }
}

// Запуск при открытии страницы
refresh();
</script>
